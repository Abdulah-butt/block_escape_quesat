  collection: ^1.18.0
  upgrader: ^13.4.0
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_lints: ^6.0.0

flutter:
